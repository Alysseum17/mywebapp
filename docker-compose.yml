services:

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mywebapp
      MYSQL_USER: mywebapp
      MYSQL_PASSWORD: securepass123
    volumes:
      - db_data:/var/lib/mysql
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mywebapp-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  webapp:
    build: .
    restart: unless-stopped
    networks:
      - mywebapp-net
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mywebapp-net
    depends_on:
      - webapp

networks:
  mywebapp-net:
    driver: bridge

volumes:
  db_data:
